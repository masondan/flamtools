<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />

		<!-- Primary Meta Tags -->
		<title>FlamTools | Tools for creators</title>
		<meta name="description" content="FlamTools – journalism training tools for creators. AI prompts, image creation, audio, charts, maps and more." />
		<meta name="author" content="Dan Mason" />
		<meta name="robots" content="noindex, nofollow" />
		<link rel="canonical" href="https://flamtools.com/" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://flamtools.com/" />
		<meta property="og:title" content="FlamTools | Tools for creators" />
		<meta property="og:description" content="Journalism training tools for creators – AI prompts, image creation, audio, charts, maps and more." />
		<meta property="og:image" content="%sveltekit.assets%/logos/logo-flamtools-og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:type" content="image/png" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://flamtools.com/" />
		<meta property="twitter:title" content="FlamTools | Tools for creators" />
		<meta property="twitter:description" content="Journalism training tools for creators – AI prompts, image creation, audio, charts, maps and more." />
		<meta property="twitter:image" content="%sveltekit.assets%/logos/logo-flamtools-og.png" />

		<!-- Theme & Icons -->
		<meta name="theme-color" content="#5422B0" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="icon" href="%sveltekit.assets%/logos/logo-flamtools-favicon.ico" sizes="any" />
		<link rel="icon" href="%sveltekit.assets%/logos/logo-flamtools-favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/logos/logo-flamtools-touch.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		%sveltekit.head%
	</head>
	<body>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
