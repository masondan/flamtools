<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />

		<!-- Primary Meta Tags -->
		<title>FlamTools – Creative Tools Hub for Storytellers</title>
		<meta name="description" content="FlamTools: A hub of free mobile-first creative tools. AI prompts, image editing, audio creation, data charts, maps, and more—designed for journalists, creators, and storytellers." />
		<meta name="author" content="Dan Mason" />
		<meta name="robots" content="noindex, nofollow" />
		<link rel="canonical" href="https://flamtools.com/" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://flamtools.com/" />
		<meta property="og:title" content="FlamTools – Creative Tools Hub" />
		<meta property="og:description" content="Free mobile-first tools for creators: AI prompt library, image editor, audio generator, chart builder, map creator, and more. All built for storytellers and journalists." />
		<meta property="og:image" content="%sveltekit.assets%/logos/logo-flamtools-og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:type" content="image/png" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://flamtools.com/" />
		<meta property="twitter:title" content="FlamTools – Creative Tools Hub" />
		<meta property="twitter:description" content="Free mobile-first tools for creators: AI prompts, image editor, audio, charts, maps & more for journalists and storytellers." />
		<meta property="twitter:image" content="%sveltekit.assets%/logos/logo-flamtools-og.png" />

		<!-- Theme & Icons -->
		<meta name="theme-color" content="#5422B0" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="icon" href="%sveltekit.assets%/logos/logo-flamtools-favicon.ico" sizes="any" />
		<link rel="icon" href="%sveltekit.assets%/logos/logo-flamtools-favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/logos/logo-flamtools-touch.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		%sveltekit.head%
	</head>
	<body>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
